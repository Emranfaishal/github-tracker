<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!-- daisyui and tailwindcss tag  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google fonts tag  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font icon tag  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- style tag  -->
    <link rel="stylesheet" href="style/style.css">

</head>

<body>
    <section class="min-h-screen max-w-md bg-white mx-auto shadow-2xl rounded-2xl m-10">

        <div class="flex justify-center items-center text-center">
            <div class="space-y-3">
                <img class="pl-20 pr-20 pt-10" src="assets/github-logo.png" alt="">
                <h2 class="font-semibold text-2xl">GitHub Issues Tracker</h2>
                <p class="text-[#64748B]">Sign in to manage your issues</p>
            </div>
        </div>

        <div class="p-5 space-y-2">
            <p class="font-medium">Username</p>
            <label class="input validator w-full">
                <input id="input-username" type="text" placeholder="Enter Username" minlength="5" maxlength="5" />
            </label>
            <p class="text-[#4A00FF]">Default: admin</p>
        </div>

        <div class="p-5 space-y-2">
            <p class="font-medium">Password</p>
            <label class="input validator w-full">
                <input id="input-password" type="password" placeholder="Enter Password" minlength="8" maxlength="8" />
            </label>
            <p class="text-[#4A00FF]">Default: admin123</p>
            <button id="login-btn" class="btn btn-outline btn-primary w-full mt-5">Sign In</button>
            <p class="text-center">-------------OR-------------</p>
        </div>

        <div class="text-center p-5">
            <p class="text-[#64748B]">Demo Credentials:</p>
            <div class="bg-gray-100 rounded-xl mt-5">
                <p class="font-bold pt-5">Username: admin</p>
                <p class="font-bold pb-5">Password: admin123</p>
            </div>
        </div>

    </section>
    <script src="script/script.js"></script>
</body>

</html>
