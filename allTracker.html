<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!-- daisyui and tailwindcss tag  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google fonts tag  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font icon tag  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- style tag  -->
    <link rel="stylesheet" href="style/style.css">

</head>

<body class="bg-gray-200">
    <!-- header title tag  -->
    <header>
        <nav class="mt-2">
            <div class="navbar bg-base-100 shadow-sm">
                <div class="flex-1">
                    <div class="flex justify-self-start items-center">
                        <img class="w-6" src="assets/github-logo.png" alt="">
                        <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
                    </div>
                </div>
                <div class="flex gap-2">
                    <input type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />
                    <button class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
                </div>
            </div>
        </nav>
    </header>
    <main class="w-10/12 mx-auto">
        <section class="flex gap-5 bg-white shadow-2xl p-5 mt-10">
            <button class="btn btn-soft btn-primary">All</button>
            <button class="btn btn-soft btn-primary">Open</button>
            <button class="btn btn-soft btn-primary">Closed</button>
        </section>


        <section class="flex gap-5 bg-white shadow-2xl mt-10">
            <div class="navbar bg-base-100 shadow-sm p-5">
                <div class="flex-1">
                    <div class="flex justify-self-start items-center gap-2">
                        <div class="bg-[#4A00FF40] rounded-4xl">
                            <img class="w-10" src="assets/Aperture.png" alt="">
                        </div>
                        <div>
                            <p class="font-semibold">50 Issues</p>
                            <p class="text-[#64748B]">Track and manage your project issues</p>
                        </div>
                    </div>
                </div>
                <div class="flex gap-2">
                    <div class="flex gap-5">
                        <p class="font-medium"><span class="text-[#00A96E] w-2"><i
                                    class="fa-solid fa-circle"></i></span>
                            open</p>
                        <p class="font-medium"><span class="text-[#A855F7] w-2"><i
                                    class="fa-solid fa-circle"></i></span> Closed</p>
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
