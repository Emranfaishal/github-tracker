<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">
    <!-- daisyui and tailwindcss tag  -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google fonts tag  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font icon tag  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- style tag  -->
    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>

</head>

<body class="w-10/12 mx-auto">
    <header>
        <nav class="mt-2">
            <div class="navbar bg-base-100 shadow-sm">
                <div class="flex-1">
                    <div class="flex justify-self-start items-center">
                        <img class="w-6" src="assets/github-logo.png" alt="">
                        <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
                    </div>
                </div>
                <div class="flex gap-2">
                    <input id="input-search" type="text" placeholder="Search issues..."
                        class="input input-bordered w-24 md:w-auto" />
                    <button id="btn-search" class="btn btn-primary"><i class="fa-solid fa-plus"></i> New Issue</button>
                </div>
            </div>
        </nav>
    </header>
    <main>
        <section class="flex gap-5 bg-white rounded-sm shadow-2xl p-5 mt-10">
            <button onclick="btnClick('all')" id="all" class="bg-blue-700 text-white btn shadow">All</button>
            <button onclick="btnClick('open')" id="open" class="btn shadow">Open</button>
            <button onclick="btnClick('closed')" id="closed" class="btn shadow">Closed</button>
        </section>

        <section class="navbar bg-base-100 rounded-sm shadow-sm p-5 mt-10">
            <div class="flex-1">
                <div class="flex justify-self-start items-center gap-5">
                    <div class="bg-[#4A00FF20] rounded-xl p-2 ">
                        <i class="w-ful h-full fa-brands fa-microsoft"></i>
                    </div>
                    <div>
                        <p class="font-semibold">
                            <span id="total">0</span>
                            Issues
                        </p>
                        <p class="text-[#64748B]">Track and manage your project issues</p>
                    </div>
                </div>
            </div>
            <div class="flex gap-2">
                <div class="flex gap-5">
                    <p class="font-medium"><span class="text-[#00A96E] w-2"><i class="fa-solid fa-circle"></i></span>
                        open</p>
                    <p class="font-medium"><span class="text-[#A855F7] w-2"><i class="fa-solid fa-circle"></i></span>
                        Closed</p>
                </div>
            </div>
        </section>

        <section class="mt-10">
            <div id="loading-spinner" class="justify-center items-center p-20 hidden">
                <span class="loading loading-spinner text-warning"></span>
            </div>
            <div id="all-section" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">

            </div>
        </section>

        <section>
            <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
                <div id="modal" class="modal-box space-y-4">

                </div>
            </dialog>
        </section>
    </main>
    <script src="tracker.js"></script>
</body>

</html>
